<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Orbit - 目標管理アプリ</title>
  <meta name="description" content="目標を軌道に乗せる、Routines・Projects・Resources の3つのAreaで管理できるゴール管理アプリ。">
  <meta name="theme-color" content="#111118" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="color-scheme" content="dark light">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Orbit">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/icons/orbit-icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/orbit-icon-180.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Google APIs for Drive Sync -->
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css?v=20260721-6">
</head>
<body>
  <div class="app-layout">
    <button id="sidebar-open-btn" class="sidebar-open-btn" aria-label="Open Sidebar">
      <i data-lucide="menu"></i>
    </button>

    <button id="install-app-btn" class="install-app-btn" type="button" hidden aria-label="Orbitをインストール" title="Orbitをインストール">
      <i data-lucide="download"></i>
    </button>

    <aside class="sidebar" id="sidebar"></aside>
    <div id="sidebar-backdrop" class="sidebar-backdrop" aria-hidden="true"></div>

    <main class="main-content" id="main-content"></main>
  </div>

  <script type="module" src="js/app.js?v=20260721-6"></script>
</body>
</html>
