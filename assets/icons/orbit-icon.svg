<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Orbit app icon</title>
  <desc id="desc">A goal orbit mark on a dark rounded square.</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="72" x2="420" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.58" stop-color="#161529"/>
      <stop offset="1" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="core" x1="184" y1="164" x2="334" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.388 0 0 0 0 0.4 0 0 0 0 0.945 0 0 0 .55 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="78" fill="url(#core)" filter="url(#glow)"/>
  <g fill="none" stroke-linecap="round">
    <ellipse cx="256" cy="256" rx="176" ry="70" stroke="#22D3EE" stroke-opacity=".78" stroke-width="18" transform="rotate(-24 256 256)"/>
    <ellipse cx="256" cy="256" rx="156" ry="60" stroke="#10B981" stroke-opacity=".56" stroke-width="12" transform="rotate(24 256 256)"/>
    <ellipse cx="256" cy="256" rx="116" ry="184" stroke="#F59E0B" stroke-opacity=".38" stroke-width="10" transform="rotate(42 256 256)"/>
  </g>
  <circle cx="388" cy="199" r="18" fill="#F59E0B"/>
  <circle cx="143" cy="317" r="14" fill="#22D3EE"/>
  <circle cx="294" cy="407" r="11" fill="#10B981"/>
</svg>
